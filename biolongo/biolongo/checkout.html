<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biolongo - Checkout</title>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="page-title">
    <i class="ph ph-credit-card"></i> Finalizar Compra
  </div>

  <div class="checkout-container">
    <div class="card-biolongo">
      <h3>Resumo do Pedido</h3>
      <div class="item-carrinho">
        <img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=100">
        <div>
          <p>iPhone 13 128GB</p>
          <span>450.000 Kz x 1</span>
        </div>
      </div>
      <div class="linha-total total-final">
        <span>Total</span>
        <span>455.000 Kz</span>
      </div>
    </div>

    <div class="card-biolongo">
      <h3><i class="ph ph-lock"></i> Pagamento Seguro</h3>
      <div class="metodo-pagamento">
        <i class="ph-fill ph-device-mobile"></i>
        <div>
          <p>Multicaixa Express</p>
          <span>Confirmação instantânea</span>
        </div>
      </div>
      <a href="pedidos.html" class="btn-pagar">
        <i class="ph ph-shield-check"></i> Pagar 455.000 Kz
      </a>
    </div>
  </div>

  <!-- BARRA INFERIOR -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="ph ph-house"></i>
      <span>Início</span>
    </a>
    <a href="checkout.html" class="nav-item active">
      <i class="ph-fill ph-shopping-cart"></i>
      <span>Carrinho</span>
    </a>
    <a href="pedidos.html" class="nav-item">
      <i class="ph ph-package"></i>
      <span>Pedidos</span>
    </a>
    <a href="fornecedor.html" class="nav-item">
      <i class="ph ph-storefront"></i>
      <span>Vender</span>
    </a>
  </nav>
</body>
</html>
