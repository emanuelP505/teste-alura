<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biolongo - Catálogo</title>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="page-title">
    <i class="ph ph-storefront"></i> Marketplace Biolongo
  </div>
  
  <div class="filtros-biolongo">
    <button class="filtro-ativo"><i class="ph ph-fire"></i> Popular</button>
    <button><i class="ph ph-truck"></i> Entrega 24h</button>
  </div>

  <div class="grelha-produtos">
    <div class="card-produto">
      <div class="badge-protegido"><i class="ph-fill ph-shield-check"></i> Protegido</div>
      <img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=400">
      <div class="info-produto">
        <h3>iPhone 13 128GB Selado</h3>
        <p class="vendedor"><i class="ph ph-map-pin"></i> Loja Paulo, Luanda</p>
        <div class="preco-entrega">
          <span class="preco">450.000 Kz</span>
          <span class="entrega"><i class="ph ph-truck"></i> 24h</span>
        </div>
        <a href="checkout.html" class="btn-comprar">
          <i class="ph ph-shopping-cart"></i> Comprar
        </a>
      </div>
    </div>
  </div>

  <!-- BARRA INFERIOR -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <i class="ph-fill ph-house"></i>
      <span>Início</span>
    </a>
    <a href="checkout.html" class="nav-item">
      <i class="ph ph-shopping-cart"></i>
      <span>Carrinho</span>
    </a>
    <a href="pedidos.html" class="nav-item">
      <i class="ph ph-package"></i>
      <span>Pedidos</span>
    </a>
    <a href="fornecedor.html" class="nav-item">
      <i class="ph ph-storefront"></i>
      <span>Vender</span>
    </a>
  </nav>
</body>
</html>
