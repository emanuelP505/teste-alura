<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biolongo - Vendedor</title>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="page-title">
    <i class="ph ph-storefront"></i> Painel Vendedor
  </div>

  <div class="card-saldo">
    <p>Saldo Disponível</p>
    <h2>125.000 Kz</h2>
    <div class="saldo-bloqueado">
      <i class="ph ph-lock"></i> 340.000 Kz bloqueado em escrow
    </div>
    <button class="btn-sacar">
      <i class="ph ph-bank"></i> Sacar para BAI
    </button>
  </div>

  <div class="card-biolongo">
    <div class="header-card">
      <h3><i class="ph ph-package"></i> Meus Produtos</h3>
      <button class="btn-add">
        <i class="ph ph-plus"></i> Novo
      </button>
    </div>
    <div class="lista-produtos-fornecedor">
      <div class="item-produto-fornecedor">
        <img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=100">
        <div>
          <p>iPhone 13 128GB</p>
          <span>Estoque: 3 · 450.000 Kz</span>
        </div>
        <i class="ph ph-dots-three-vertical"></i>
      </div>
    </div>
  </div>

  <!-- BARRA INFERIOR -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="ph ph-house"></i>
      <span>Início</span>
    </a>
    <a href="checkout.html" class="nav-item">
      <i class="ph ph-shopping-cart"></i>
      <span>Carrinho</span>
    </a>
    <a href="pedidos.html" class="nav-item">
      <i class="ph ph-package"></i>
      <span>Pedidos</span>
    </a>
    <a href="fornecedor.html" class="nav-item active">
      <i class="ph-fill ph-storefront"></i>
      <span>Vender</span>
    </a>
  </nav>
</body>
</html>
